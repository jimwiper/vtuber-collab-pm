<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; font-size: 13px; padding: 12px; color: #212121; }
    h2 { font-size: 15px; margin: 0 0 16px; color: #1a237e; }
    label { display: block; margin: 10px 0 3px; font-weight: bold; color: #424242; }
    input, select, textarea {
      width: 100%; box-sizing: border-box; padding: 6px 8px;
      border: 1px solid #bdbdbd; border-radius: 4px; font-size: 13px;
    }
    textarea { height: 70px; resize: vertical; }
    .scale-badge {
      display: inline-block; padding: 2px 10px; border-radius: 12px;
      font-weight: bold; font-size: 12px;
    }
    .scale-小 { background: #e8f5e9; color: #2e7d32; }
    .scale-中 { background: #fff3e0; color: #e65100; }
    .scale-大 { background: #ffebee; color: #c62828; }
    button {
      width: 100%; margin-top: 14px; padding: 9px;
      background: #1a237e; color: white; border: none;
      border-radius: 4px; font-size: 14px; cursor: pointer;
    }
    button:disabled { background: #9e9e9e; cursor: not-allowed; }
    #result {
      margin-top: 12px; padding: 10px; border-radius: 4px;
      white-space: pre-wrap; font-size: 12px; display: none;
    }
    .result-ok  { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }
    .result-err { background: #ffebee; border: 1px solid #ef9a9a; color: #b71c1c; }
    .required::after { content: ' *'; color: #c62828; }
    .hint { font-size: 11px; color: #757575; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>新規案件登録</h2>

  <label class="required">案件名</label>
  <input type="text" id="dealName" placeholder="例: ○○コスメ タイアップ配信">

  <label class="required">案件種別</label>
  <select id="dealType">
    <option value="">選択してください</option>
    <option>商品プロモーション（SNS・配信）</option>
    <option>タイアップ楽曲・MV出演</option>
    <option>ゲームコラボ（配信・イベント）</option>
    <option>リアルイベント出演</option>
    <option>グッズコラボ</option>
    <option>外部メディア出演（雑誌・TV等）</option>
    <option>その他</option>
  </select>

  <label class="required">企業名</label>
  <input type="text" id="companyName" placeholder="例: 株式会社○○">

  <label>企業担当者名</label>
  <input type="text" id="companyContact" placeholder="例: 山田 太郎">

  <label>タレント</label>
  <select id="talentId">
    <option value="">未定 / 選択してください</option>
  </select>

  <label>返答期限</label>
  <input type="date" id="replyLimit">
  <div class="hint">企業への返答期限</div>

  <label>実施予定日</label>
  <input type="date" id="execDate">

  <label>担当スタッフ</label>
  <select id="assignedStaff">
    <option value="">選択してください</option>
  </select>

  <label>備考・追加情報</label>
  <textarea id="notes" placeholder="案件の詳細・特記事項など。Claudeが規模判定の参考にします。"></textarea>
  <div class="hint">⚠️ 企業名・タレント名はここに書かないでください（AIに送信されます）</div>

  <button id="submitBtn" onclick="submitForm()">登録してAIに規模判定させる</button>

  <div id="result"></div>

  <script>
    // タレント・スタッフ一覧をロード
    google.script.run
      .withSuccessHandler(function(list) {
        const sel = document.getElementById('talentId');
        list.forEach(function(t) {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = t.name;
          sel.appendChild(opt);
        });
        // スタッフ選択にも同じリストを使う
        const staffSel = document.getElementById('assignedStaff');
        list.forEach(function(t) {
          const opt = document.createElement('option');
          opt.value = t.name;
          opt.textContent = t.name;
          staffSel.appendChild(opt);
        });
      })
      .getTalentListForForm();

    function submitForm() {
      const dealName    = document.getElementById('dealName').value.trim();
      const dealType    = document.getElementById('dealType').value;
      const companyName = document.getElementById('companyName').value.trim();

      if (!dealName || !dealType || !companyName) {
        showResult('案件名・種別・企業名は必須です', false);
        return;
      }

      const talentSel = document.getElementById('talentId');
      const talentId   = talentSel.value;
      const talentName = talentSel.options[talentSel.selectedIndex].text.replace('未定 / 選択してください', '');

      const formData = {
        dealName:       dealName,
        dealType:       dealType,
        companyName:    companyName,
        companyContact: document.getElementById('companyContact').value.trim(),
        talentId:       talentId,
        talentName:     talentName,
        replyLimit:     document.getElementById('replyLimit').value,
        execDate:       document.getElementById('execDate').value,
        assignedStaff:  document.getElementById('assignedStaff').value,
        notes:          document.getElementById('notes').value.trim(),
      };

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '処理中…（約30秒）';

      google.script.run
        .withSuccessHandler(function(result) {
          btn.disabled = false;
          btn.textContent = '登録してAIに規模判定させる';
          showResult(result.success ? result.message : result.error, result.success);
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = '登録してAIに規模判定させる';
          showResult('エラー: ' + err.message, false);
        })
        .submitDealForm(formData);
    }

    function showResult(msg, ok) {
      const el = document.getElementById('result');
      el.textContent = msg;
      el.className = 'result-' + (ok ? 'ok' : 'err');
      el.style.display = 'block';
    }
  </script>
</body>
</html>
